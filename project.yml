name: TairiUI
options:
  bundleIdPrefix: org.tairi.app
  deploymentTarget:
    macOS: "14.0"
settings:
  base:
    SWIFT_VERSION: 6.0
targets:
  UITestHost:
    type: application
    platform: macOS
    settings:
      base:
        CODE_SIGNING_ALLOWED: YES
        CODE_SIGN_IDENTITY: "-"
    sources:
      - path: UITestHost
    info:
      path: UITestHost/Info.plist
      properties:
        CFBundleDevelopmentRegion: en
        CFBundleDisplayName: UITestHost
        CFBundleExecutable: $(EXECUTABLE_NAME)
        CFBundleIdentifier: org.tairi.app.UITestHost
        CFBundleInfoDictionaryVersion: "6.0"
        CFBundleName: UITestHost
        CFBundlePackageType: APPL
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        LSMinimumSystemVersion: "14.0"
        NSHighResolutionCapable: true
        NSPrincipalClass: NSApplication
  TairiUITests:
    type: bundle.ui-testing
    platform: macOS
    settings:
      base:
        CODE_SIGNING_ALLOWED: YES
        CODE_SIGN_IDENTITY: "-"
    sources:
      - path: Tests/TairiUITests
    info:
      path: TairiUITests/Info.plist
      properties:
        CFBundleDevelopmentRegion: en
        CFBundleExecutable: $(EXECUTABLE_NAME)
        CFBundleIdentifier: org.tairi.app.TairiUITests
        CFBundleInfoDictionaryVersion: "6.0"
        CFBundleName: TairiUITests
        CFBundlePackageType: BNDL
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
    dependencies:
      - target: UITestHost
schemes:
  TairiUI:
    build:
      targets:
        UITestHost: all
        TairiUITests:
          - test
    test:
      gatherCoverageData: false
      targets:
        - name: TairiUITests
