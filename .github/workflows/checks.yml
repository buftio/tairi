name: Checks

on:
  push:
    branches:
      - main

jobs:
  swift:
    runs-on: macos-15

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Select Xcode 26
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26"

      - name: Lint Swift sources
        shell: bash
        run: |
          set -euo pipefail
          ./scripts/swift-format.sh lint

      - name: Run tests
        shell: bash
        run: |
          set -euo pipefail
          swift test
